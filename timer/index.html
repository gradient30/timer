<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimerApp - Windows定时器</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div class="app">
      <!-- 标题栏 -->
      <header class="header">
        <h1>TimerApp</h1>
        <span class="version">v0.1.0</span>
      </header>

      <!-- 主计时器显示 -->
      <main class="timer-display">
        <div class="timer-circle">
          <div class="timer-text" id="timer-display">30:00</div>
          <div class="timer-label" id="timer-status">准备就绪</div>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 100%"></div>
        </div>
      </main>

      <!-- 控制按钮 -->
      <section class="controls">
        <button id="btn-start" class="btn btn-primary">开始</button>
        <button id="btn-pause" class="btn btn-secondary" disabled>暂停</button>
        <button id="btn-stop" class="btn btn-danger">重置</button>
      </section>

      <!-- 快速设置 -->
      <section class="quick-settings">
        <span class="label">快速设置:</span>
        <button class="btn-quick" data-minutes="15">15分钟</button>
        <button class="btn-quick" data-minutes="30">30分钟</button>
        <button class="btn-quick" data-minutes="45">45分钟</button>
        <button class="btn-quick" data-minutes="60">60分钟</button>
      </section>

      <!-- 自定义时间 -->
      <section class="custom-setting">
        <label for="custom-minutes">自定义:</label>
        <input type="number" id="custom-minutes" min="1" max="1440" value="30" />
        <span>分钟</span>
        <button id="btn-set-custom" class="btn btn-small">设置</button>
      </section>

      <!-- 状态栏 -->
      <footer class="status-bar">
        <span id="status-text">就绪</span>
        <span class="hint">关闭窗口最小化到托盘</span>
      </footer>
    </div>
  </body>
</html>
